  <!-- 部署这个单文件就够了 -->
  <!DOCTYPE html>
  <html>
  <head>
    <meta charset="utf-8">
    <style>
      body { font-family: "PingFang SC", sans-serif; padding: 16px; }
      .title { font-weight: bold; font-size: 15px; margin-bottom: 4px; }
      .stats { font-size: 12px; color: #555; margin-bottom: 5px; }
      .track { position: relative; height: 18px; background: #e0e0e0; border-radius: 2px; margin-bottom: 4px; }
      .fill { height: 100%; border-radius: 2px 0 0 2px; }
      .line { position: absolute; top: -3px; bottom: -3px; width: 2px; background: #c0392b; }
      .avail { font-size: 11px; color: #888; margin-bottom: 16px; }
    </style>
  </head>
  <body>
  <div id="app"></div>
  <script>
  // 数据直接写在这里，或通过 URL 参数传入
  const data = [
    { name: "公司主NAS 存储池1", used: 164.9, total: 192.0, threshold: 80, color: "#d9001b" },
    { name: "公司主NAS 存储池2", used: 75.5,  total: 174.6, threshold: 80, color: "#1a7c3e" },
    { name: "ArcsuNAS存储池",         used: 132.5, total: 192.0, threshold: 80, color: "#1a7c3e" },
  ];

  const app = document.getElementById("app");
  data.forEach(d => {
    const pct = (d.used / d.total * 100).toFixed(1);
    app.innerHTML += `
      <div class="title" style="color:${d.color}">${d.name}</div>
      <div class="stats">${d.used}TB / ${d.total}TB (${pct}%)</div>
      <div class="track">
        <div class="fill" style="width:${pct}%;background:${d.color}"></div>
        <div class="line" style="left:${d.threshold}%"></div>
      </div>
      <div class="avail">可用 ${(d.total - d.used).toFixed(1)}TB</div>`;
  });
  </script>
  </body>
  </html>
